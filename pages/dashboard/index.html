<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!--
    TITULO: DASHBOARD BASE
    O QUE FAZ: Página inicial após login — verifica sessão e exibe painel
    DATA: 2026-06-24
    RESULTADO ESPERADO: Usuário autenticado vê o dashboard, não autenticado volta ao login
  -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Gestão Escolar</title>

  <link rel="stylesheet" href="../../assets/css/style.css" />
  <link rel="stylesheet" href="../../assets/css/dashboard.css" />
</head>
<body>

  <div class="dashboard-wrapper">

    <!-- HEADER -->
    <header class="dashboard-header">
      <div class="header-left">
        <span class="header-icon">🏫</span>
        <span class="header-title">Gestão Escolar</span>
      </div>
      <div class="header-right">
        <span class="header-usuario" id="nomeUsuario">Carregando...</span>
        <button class="btn-sair" id="btnSair">Sair</button>
      </div>
    </header>

    <!-- CONTEÚDO -->
    <main class="dashboard-main">
      <h1 class="dashboard-titulo">Bem-vindo ao Sistema!</h1>
      <p class="dashboard-subtitulo" id="papelUsuario">Carregando informações...</p>

      <div class="cards-grid">
        <div class="card">
          <div class="card-icon">👥</div>
          <div class="card-info">
            <span class="card-label">Alunos</span>
            <span class="card-valor">—</span>
          </div>
        </div>
        <div class="card">
          <div class="card-icon">📚</div>
          <div class="card-info">
            <span class="card-label">Turmas</span>
            <span class="card-valor">—</span>
          </div>
        </div>
        <div class="card">
          <div class="card-icon">🎓</div>
          <div class="card-info">
            <span class="card-label">Professores</span>
            <span class="card-valor">—</span>
          </div>
        </div>
        <div class="card">
          <div class="card-icon">📋</div>
          <div class="card-info">
            <span class="card-label">Disciplinas</span>
            <span class="card-valor">—</span>
          </div>
        </div>
      </div>
    </main>

  </div>

  <!-- Scripts — ordem obrigatória -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../assets/js/app.js"></script>
  <script src="../../assets/js/dashboard.js"></script>

</body>
</html>
