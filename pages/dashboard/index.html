<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!--
    TITULO: DASHBOARD COM SIDEBAR
    O QUE FAZ: Página principal com menu lateral responsivo
    DATA: 2026-06-24
    RESULTADO ESPERADO: Dashboard com sidebar funcional no desktop e mobile
  -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Gestão Escolar</title>

  <link rel="stylesheet" href="../../assets/css/style.css" />
  <link rel="stylesheet" href="../../assets/css/sidebar.css" />
  <link rel="stylesheet" href="../../assets/css/dashboard.css" />
</head>
<body>

  <!-- HEADER MOBILE -->
  <header class="header-mobile">
    <button class="btn-menu-mobile" id="btnMenuMobile">☰</button>
    <span class="header-mobile-titulo">Gestão Escolar</span>
    <span></span>
  </header>

  <div class="pagina-wrapper">

    <!-- SIDEBAR -->
    <div id="sidebar-container"></div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div class="conteudo-principal">
      <main class="dashboard-main">
        <h1 class="dashboard-titulo">Bem-vindo ao Sistema!</h1>
        <p class="dashboard-subtitulo" id="papelUsuario">Carregando informações...</p>

        <div class="cards-grid">
          <div class="card">
            <div class="card-icon">👥</div>
            <div class="card-info">
              <span class="card-label">Alunos</span>
              <span class="card-valor">—</span>
            </div>
          </div>
          <div class="card">
            <div class="card-icon">📚</div>
            <div class="card-info">
              <span class="card-label">Turmas</span>
              <span class="card-valor">—</span>
            </div>
          </div>
          <div class="card">
            <div class="card-icon">🎓</div>
            <div class="card-info">
              <span class="card-label">Professores</span>
              <span class="card-valor">—</span>
            </div>
          </div>
          <div class="card">
            <div class="card-icon">📋</div>
            <div class="card-info">
              <span class="card-label">Disciplinas</span>
              <span class="card-valor">—</span>
            </div>
          </div>
        </div>
      </main>
    </div>

  </div>

  <!-- Scripts — ordem obrigatória -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../assets/js/app.js"></script>
  <script src="../../components/sidebar.js"></script>
  <script src="../../assets/js/dashboard.js"></script>

</body>
</html>
