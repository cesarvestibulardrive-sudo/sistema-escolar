<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!--
    TITULO: PÁGINA DE TURMAS
    O QUE FAZ: Lista, cria, edita e exclui turmas da escola
    DATA: 2026-06-24
    RESULTADO ESPERADO: CRUD completo de turmas com tabela e formulário
  -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turmas — Gestão Escolar</title>

  <link rel="stylesheet" href="../../assets/css/style.css" />
  <link rel="stylesheet" href="../../assets/css/sidebar.css" />
  <link rel="stylesheet" href="../../assets/css/paginas.css" />
</head>
<body>

  <!-- HEADER MOBILE -->
  <header class="header-mobile">
    <button class="btn-menu-mobile" id="btnMenuMobile">☰</button>
    <span class="header-mobile-titulo">Turmas</span>
    <span></span>
  </header>

  <div class="pagina-wrapper">

    <!-- SIDEBAR -->
    <div id="sidebar-container"></div>

    <!-- CONTEÚDO -->
    <div class="conteudo-principal">
      <main class="pagina-main">

        <!-- CABEÇALHO DA PÁGINA -->
        <div class="pagina-header">
          <div>
            <h1 class="pagina-titulo">📚 Turmas</h1>
            <p class="pagina-subtitulo">Gerencie as turmas da escola</p>
          </div>
          <button class="btn-primario" id="btnNovaTurma">+ Nova Turma</button>
        </div>

        <!-- TABELA -->
        <div class="card-tabela">
          <table class="tabela" id="tabelaTurmas">
            <thead>
              <tr>
                <th>Nome</th>
                <th>Série</th>
                <th>Turno</th>
                <th>Ano Letivo</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="corpoTabelaTurmas">
              <tr>
                <td colspan="6" class="tabela-loading">Carregando...</td>
              </tr>
            </tbody>
          </table>
        </div>

      </main>
    </div>
  </div>

  <!-- MODAL DE TURMA -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-titulo" id="modalTitulo">Nova Turma</h2>
        <button class="modal-fechar" id="btnFecharModal">✕</button>
      </div>
      <form class="modal-form" id="formTurma">
        <input type="hidden" id="turmaId" />

        <div class="form-group">
          <label for="turmaNome">Nome da Turma *</label>
          <input type="text" id="turmaNome" placeholder="Ex: 1º Ano A" required />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="turmaSerie">Série *</label>
            <input type="text" id="turmaSerie" placeholder="Ex: 1º Ano" required />
          </div>
          <div class="form-group">
            <label for="turmaTurno">Turno *</label>
            <select id="turmaTurno" required>
              <option value="">Selecione...</option>
              <option value="manha">Manhã</option>
              <option value="tarde">Tarde</option>
              <option value="noite">Noite</option>
              <option value="integral">Integral</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="turmaAno">Ano Letivo *</label>
          <input type="number" id="turmaAno" value="2026" min="2020" max="2030" required />
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-secundario" id="btnCancelar">Cancelar</button>
          <button type="submit" class="btn-primario" id="btnSalvarTurma">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Scripts — ordem obrigatória -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../assets/js/app.js"></script>
  <script src="../../components/sidebar.js"></script>
  <script src="../../assets/js/turmas.js"></script>

</body>
</html>
